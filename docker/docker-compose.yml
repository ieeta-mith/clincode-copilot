version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: clincode-backend
    ports:
      - "8000:80"
    environment:
      - CLINCODE_DEVICE=cpu
      - CLINCODE_MODEL_DIR=/code/models
      - CLINCODE_ICD_DICTIONARY_PATH=/code/models/icd_dictionary.json
      - CLINCODE_MAX_CHUNKS=20
      - CLINCODE_MAX_LENGTH=128
      - CLINCODE_CHUNK_OVERLAP=32
      - CLINCODE_NEIGHBOR_COUNT=50
      - CLINCODE_DEFAULT_MIN_FREQ=0
      - CLINCODE_CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      # Mount models directory - models must be present on host
      - ../models:/code/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: clincode-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:80
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: clincode-network
